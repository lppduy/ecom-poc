syntax = "proto3";

package inventory;

option go_package = "github.com/lppduy/ecom-poc/gen/inventory;inventorypb";

service InventoryService {
  rpc Reserve (ReserveRequest)  returns (ReserveResponse);
  rpc Confirm (OrderIDRequest)  returns (CommonResponse);
  rpc Release (OrderIDRequest)  returns (CommonResponse);
}

message OrderItem {
  string product_id = 1;
  int32  quantity   = 2;
}

message ReserveRequest {
  int64             order_id = 1;
  repeated OrderItem items   = 2;
}

message ReserveResponse {
  bool   success = 1;
  string message = 2;
}

message OrderIDRequest {
  int64 order_id = 1;
}

message CommonResponse {
  bool   success = 1;
  string message = 2;
}
